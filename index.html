<body>
    <h1 class="visually-hidden">Clock &amp; Timer — a minimal, customizable online clock and countdown timer</h1>
    <p class="visually-hidden">Free online clock and countdown timer with 11 themes, fully customizable colors, and ambient effects including snow, petals, embers, stars, and rain. No signup required, works offline.</p>

    <div class="settings-backdrop" id="settingsBackdrop" hidden aria-hidden="true"></div>
    <div class="settings-corner" id="settingsCorner" title="Appearance — hover this corner or press Ctrl+comma (⌘ on Mac)">
        <button type="button" class="settings-toggle" id="settingsToggle" aria-label="Appearance settings. Hover the top-left corner or press Control and comma." aria-expanded="false" aria-controls="settingsPanel">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </button>
    </div>

    <aside class="settings-panel" id="settingsPanel" hidden aria-hidden="true" role="dialog" aria-labelledby="settingsHeading">
        <h2 id="settingsHeading" class="settings-heading">Appearance</h2>
        <div class="preset-toolbar">
            <div class="preset-chips" role="group" aria-label="Color presets">
                <button type="button" class="preset-chip" data-preset="dark" aria-label="Dark preset" title="Dark"></button>
                <button type="button" class="preset-chip" data-preset="light" aria-label="Light preset" title="Light"></button>
                <button type="button" class="preset-chip" data-preset="mono" aria-label="Mono preset" title="Mono"></button>
                <button type="button" class="preset-chip" data-preset="sepia" aria-label="Sepia preset" title="Sepia"></button>
                <button type="button" class="preset-chip" data-preset="forest" aria-label="Forest preset" title="Forest"></button>
                <button type="button" class="preset-chip" data-preset="ocean" aria-label="Ocean preset" title="Ocean"></button>
                <button type="button" class="preset-chip" data-preset="winter" aria-label="Winter preset" title="Winter"></button>
                <button type="button" class="preset-chip" data-preset="sakura" aria-label="Sakura preset" title="Sakura"></button>
                <button type="button" class="preset-chip" data-preset="ember" aria-label="Ember preset" title="Ember"></button>
                <button type="button" class="preset-chip" data-preset="cosmos" aria-label="Cosmos preset" title="Cosmos"></button>
                <button type="button" class="preset-chip" data-preset="rain" aria-label="Rain preset" title="Rain"></button>
                <button type="button" class="preset-chip preset-chip--saved" data-preset="saved" id="presetSavedBtn" disabled aria-disabled="true" aria-label="Saved theme" title="Save a theme first"></button>
            </div>
            <button type="button" class="save-theme-btn" id="saveThemeBtn">Save current theme</button>
        </div>

        <div class="settings-fields">
            <label class="color-field"><span class="color-field-label">Background</span><input type="color" data-var="--bg" aria-label="Background color"></label>
            <label class="color-field"><span class="color-field-label">Text</span><input type="color" data-var="--fg" aria-label="Text color"></label>
            <label class="color-field"><span class="color-field-label">Start</span><input type="color" data-var="--start" aria-label="Start button color"></label>
            <label class="color-field"><span class="color-field-label">Pause</span><input type="color" data-var="--pause" aria-label="Pause button color"></label>
            <label class="color-field"><span class="color-field-label">Stop</span><input type="color" data-var="--stop" aria-label="Stop button color"></label>
            <label class="color-field effect-row">
                <span class="color-field-label">Effect</span>
                <select id="effectSelect" aria-label="Ambient effect">
                    <option value="none">None</option>
                    <option value="snow">Snowflakes</option>
                    <option value="petals">Petals</option>
                    <option value="embers">Embers</option>
                    <option value="stars">Stars</option>
                    <option value="rain">Rain</option>
                </select>
            </label>
            <label class="color-field"><span class="color-field-label">Effect color</span><input type="color" data-var="--effect-color" aria-label="Effect color"></label>
        </div>
        <button type="button" class="reset-link" id="resetSettings">Reset to defaults</button>
    </aside>

    <div class="timer-toast" id="timerToast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

    <div class="clock-section" id="clockSection">
        <input type="text" class="clock-header" id="clockHeader" placeholder="" aria-label="Optional heading above the clock">
        <div class="clock" id="clock">00:00:00</div>
        <button type="button" class="toggle-timer" id="toggleBtn">Set Timer</button>
    </div>

    <div class="timer-section" id="timerSection">
        <div class="timer-setup" id="timerSetup">
            <input type="text" class="timer-title" id="timerTitle" placeholder="What's this timer for?">

            <div class="timer-controls">
                <input type="number" id="minutes" placeholder="Min" min="0" max="999">
                <input type="number" id="seconds" placeholder="Sec" min="0" max="59">
            </div>

            <div class="button-group">
                <button type="button" class="btn-start" id="startBtn">Start</button>
            </div>
            <button type="button" class="btn-back" id="backBtn">Back to Clock</button>
        </div>

        <div class="timer-running" id="timerRunning">
            <div class="timer-title-display" id="timerTitleDisplay"></div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="button-group hover-show">
                <button type="button" class="btn-pause" id="pauseBtn">Pause</button>
                <button type="button" class="btn-reset" id="stopBtn">Stop</button>
            </div>
        </div>
    </div>

    <script defer src="js/clock.js"></script>
    <script defer src="js/timer.js"></script>
    <script defer src="js/themes.js"></script>
    <script defer src="js/main.js"></script>
</body>
