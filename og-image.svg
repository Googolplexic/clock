<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Clock and Timer - minimal online clock and countdown timer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2f6feb" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2f6feb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="380" fill="url(#glow)"/>
  <text x="600" y="305" text-anchor="middle" fill="#f7f7f5" font-family="Segoe UI, system-ui, -apple-system, Roboto, Arial, sans-serif" font-size="180" font-weight="300" letter-spacing="-4">12:34:56</text>
  <text x="600" y="410" text-anchor="middle" fill="#9aa3ad" font-family="Segoe UI, system-ui, -apple-system, Roboto, Arial, sans-serif" font-size="40" font-weight="400">Minimal online clock and countdown timer</text>
  <text x="600" y="470" text-anchor="middle" fill="#5b6672" font-family="Segoe UI, system-ui, -apple-system, Roboto, Arial, sans-serif" font-size="26" font-weight="400">11 themes &#8226; ambient effects &#8226; works offline</text>
</svg>
